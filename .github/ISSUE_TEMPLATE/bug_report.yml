name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: platform
    attributes:
      label: Platform
      description: Which platform are you seeing this on?
      placeholder: "e.g. Android 14, iOS 17, Desktop (macOS)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Open the app
        2. Navigate to ...
        3. Tap ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs, stack traces, or screenshots.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: App version
      description: Version string or commit hash if building from source.
      placeholder: "e.g. 4.2.1 or commit abc1234"
    validations:
      required: false
