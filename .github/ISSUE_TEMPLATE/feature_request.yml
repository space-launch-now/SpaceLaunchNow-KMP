name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for SpaceLaunchNow? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what would it improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about.
    validations:
      required: false

  - type: input
    id: platform
    attributes:
      label: Platform
      description: Is this specific to a platform?
      placeholder: "e.g. Android, iOS, Desktop, All"
    validations:
      required: false
