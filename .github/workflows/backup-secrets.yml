name: Backup GitHub Secrets

on:
  # Manual trigger only for security
  workflow_dispatch:
    inputs:
      include_sensitive:
        description: 'Include sensitive secrets (API keys, tokens)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  backup-secrets:
    name: Export Secrets to File
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Export all secrets to environment variables and write to file
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}
          
      - name: Create secrets backup file
        run: |
          echo "# GitHub Actions Secrets Backup - $(date)" > secrets-backup.txt
          echo "# Repository: ${{ github.repository }}" >> secrets-backup.txt
          echo "# Generated on: $(date)" >> secrets-backup.txt
          echo "# Branch: ${{ github.ref_name }}" >> secrets-backup.txt
          echo "# Commit: ${{ github.sha }}" >> secrets-backup.txt
          echo "" >> secrets-backup.txt
          echo "# =================================" >> secrets-backup.txt
          echo "# SECRETS INVENTORY" >> secrets-backup.txt
          echo "# =================================" >> secrets-backup.txt
          echo "" >> secrets-backup.txt
          
          # List all environment variables that were set from secrets
          env | grep -v -E '^(HOME|USER|PATH|PWD|SHELL|TERM|LANG|LC_|GITHUB_|RUNNER_|CI|ACTIONS_)' | sort >> secrets-backup.txt
          
      - name: Create secrets inventory (names only)
        run: |
          echo "" >> secrets-inventory.txt
          echo "# GitHub Actions Secrets Inventory - $(date)" > secrets-inventory.txt
          echo "# Repository: ${{ github.repository }}" >> secrets-inventory.txt
          echo "# Total secrets found: $(env | grep -v -E '^(HOME|USER|PATH|PWD|SHELL|TERM|LANG|LC_|GITHUB_|RUNNER_|CI|ACTIONS_)' | wc -l)" >> secrets-inventory.txt
          echo "" >> secrets-inventory.txt
          echo "# Secret Names (values hidden for security):" >> secrets-inventory.txt
          
          # List only secret names, not values
          env | grep -v -E '^(HOME|USER|PATH|PWD|SHELL|TERM|LANG|LC_|GITHUB_|RUNNER_|CI|ACTIONS_)' | cut -d'=' -f1 | sort | sed 's/^/- /' >> secrets-inventory.txt
          
      - name: Show secrets inventory in job summary
        run: |
          echo "## 🔐 Secrets Backup Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Total Secrets:** $(env | grep -v -E '^(HOME|USER|PATH|PWD|SHELL|TERM|LANG|LC_|GITHUB_|RUNNER_|CI|ACTIONS_)' | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Secret Names:" >> $GITHUB_STEP_SUMMARY
          env | grep -v -E '^(HOME|USER|PATH|PWD|SHELL|TERM|LANG|LC_|GITHUB_|RUNNER_|CI|ACTIONS_)' | cut -d'=' -f1 | sort | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Security Note:** Full secret values are available in the downloaded artifacts. Handle with extreme care!" >> $GITHUB_STEP_SUMMARY
          
      - name: Upload secrets backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrets-backup-${{ github.run_id }}
          path: |
            secrets-backup.txt
            secrets-inventory.txt
          retention-days: 7
          
      - name: Security reminder
        run: |
          echo "🔐 SECURITY REMINDER:"
          echo "- The uploaded artifact contains ALL your secret values"
          echo "- Download immediately and store securely"
          echo "- Delete the artifact after download"
          echo "- Never commit these files to your repository"
          echo "- Consider encrypting the backup file"