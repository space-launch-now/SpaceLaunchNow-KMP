name: Deploy to Play Console Alpha

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'

env:
  CI: true

jobs:
  deploy:
    name: Build and Deploy to Alpha
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Create .env file
        run: |
          echo "API_KEY=${{ secrets.API_KEY }}" > .env

      - name: Decode Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: |
          echo $FIREBASE_GOOGLE_SERVICES_JSON | base64 -d > composeApp/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > release.keystore
          echo "KEYSTORE_FILE=$(pwd)/release.keystore" >> $GITHUB_ENV

      - name: Auto-increment build number
        run: |
          # Read current version
          VERSION_MAJOR=$(grep "versionMajor=" version.properties | cut -d'=' -f2)
          VERSION_MINOR=$(grep "versionMinor=" version.properties | cut -d'=' -f2)
          VERSION_PATCH=$(grep "versionPatch=" version.properties | cut -d'=' -f2)
          BUILD_NUMBER=$(grep "versionBuildNumber=" version.properties | cut -d'=' -f2)
          
          # Increment build number
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          
          # Update version.properties
          sed -i "s/versionBuildNumber=.*/versionBuildNumber=$NEW_BUILD_NUMBER/" version.properties
          
          # Set environment variables for later use
          echo "VERSION_NAME=${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}-b${NEW_BUILD_NUMBER}" >> $GITHUB_ENV
          echo "VERSION_CODE=$((VERSION_MAJOR * 1000000 + VERSION_MINOR * 100000 + VERSION_PATCH * 10000 + NEW_BUILD_NUMBER))" >> $GITHUB_ENV
          
          # Commit version bump
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add version.properties
          git commit -m "chore: bump version to ${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}-b${NEW_BUILD_NUMBER} [skip ci]"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        if: github.event.inputs.skip_tests != 'true'
        run: ./gradlew test

      - name: Build Release Bundle
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :composeApp:bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ env.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew :composeApp:assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload to Play Console
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_CONSOLE_SERVICE_ACCOUNT_JSON }}
          packageName: me.calebjones.spacelaunchnow
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: alpha
          status: completed
          releaseName: ${{ env.VERSION_NAME }}
          whatsNewDirectory: docs/release-notes/
          mappingFile: composeApp/build/outputs/mapping/release/mapping.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: release-apk-${{ env.VERSION_NAME }}
          path: composeApp/build/outputs/apk/release/composeApp-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v3
        with:
          name: release-aab-${{ env.VERSION_NAME }}
          path: composeApp/build/outputs/bundle/release/composeApp-release.aab
          retention-days: 30

      - name: Push version bump
        run: |
          git push origin HEAD:master

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.VERSION_NAME }}
          release_name: Release ${{ env.VERSION_NAME }}
          body: |
            ## 🚀 Space Launch Now ${{ env.VERSION_NAME }}
            
            ### Changes
            - Auto-generated release from CI/CD pipeline
            - Deployed to Google Play Console Alpha track
            
            ### Version Info
            - Version Code: ${{ env.VERSION_CODE }}
            - Version Name: ${{ env.VERSION_NAME }}
            
            ### Downloads
            - APK and AAB available as workflow artifacts
            
            ---
            *This release was automatically created by GitHub Actions*
          draft: false
          prerelease: false

      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const version = '${{ env.VERSION_NAME }}';
            const emoji = status === 'success' ? '✅' : '❌';
            const message = `${emoji} Deployment ${status}: Version ${version}`;
            
            console.log(message);