name: Master Deploy - Production Release (Parallel)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  CI: true

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  # Job 1: Calculate version (no commit yet)
  version:
    name: Calculate Version & Changelog
    runs-on: ubuntu-latest
    if: false  # DISABLED FOR TESTING
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      changelog: ${{ steps.changelog.outputs.clean_changelog }}
      skipped: ${{ steps.changelog.outputs.skipped }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: "CHANGELOG.md"
          version-file: "./version.properties"
          version-path: "version"
          skip-version-file: "true"
          skip-commit: "true"
          skip-tag: "true"
          git-push: "false"
          # During pre-release, we manage versioning manually below
          # This action only generates the changelog

      - name: Calculate new version (no commit)
        id: version
        env:
          # Set FORCE_VERSION to override automatic versioning (e.g., "4.0.0")
          # Leave empty to use automatic semantic versioning
          # During pre-release, lock at 4.0.0 to only increment build number
          FORCE_VERSION: "4.0.0"
        run: |
          if [ -n "$FORCE_VERSION" ]; then
            NEW_VERSION="$FORCE_VERSION"
            echo "🔒 Using forced version: $NEW_VERSION (pre-release mode)"
          else
            NEW_VERSION="${{ steps.changelog.outputs.version }}"
            echo "📈 Using semantic version: $NEW_VERSION"
          fi
          
          BUILD_NUMBER=$(grep "versionBuildNumber=" version.properties | cut -d'=' -f2)
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          
          VERSION_MAJOR=$(echo $NEW_VERSION | cut -d'.' -f1)
          VERSION_MINOR=$(echo $NEW_VERSION | cut -d'.' -f2)
          VERSION_PATCH=$(echo $NEW_VERSION | cut -d'.' -f3)
          
          VERSION_NAME="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}-b${NEW_BUILD_NUMBER}"
          VERSION_CODE=$((VERSION_MAJOR * 1000000 + VERSION_MINOR * 100000 + VERSION_PATCH * 10000 + NEW_BUILD_NUMBER))
          
          cat > version.properties << EOF
          # Version configuration for Space Launch Now KMP
          # Format: major.minor.patch-buildNumber
          version=${NEW_VERSION}
          versionMajor=${VERSION_MAJOR}
          versionMinor=${VERSION_MINOR}
          versionPatch=${VERSION_PATCH}
          versionBuildNumber=${NEW_BUILD_NUMBER}
          EOF
          
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Create release notes
        run: |
          mkdir -p docs/release-notes
          cat > docs/release-notes/v${{ env.VERSION_NAME }}.md << 'EOF'
          ## 🚀 Space Launch Now ${{ env.VERSION_NAME }}
          
          **Release Date:** $(date +%Y-%m-%d)
          **Version Code:** ${{ env.VERSION_CODE }}
          
          ${{ steps.changelog.outputs.clean_changelog }}
          
          ---
          *This release was automatically created by GitHub Actions*
          EOF
          
          echo "## 🚀 Space Launch Now ${{ env.VERSION_NAME }}" > release-notes.txt
          echo "" >> release-notes.txt
          echo "**Release Date:** $(date +%Y-%m-%d)" >> release-notes.txt
          echo "**Version Code:** ${{ env.VERSION_CODE }}" >> release-notes.txt
          echo "" >> release-notes.txt
          echo "${{ steps.changelog.outputs.clean_changelog }}" >> release-notes.txt

      - name: Upload version artifacts (not committed yet)
        uses: actions/upload-artifact@v4
        with:
          name: version-files
          path: |
            version.properties
            CHANGELOG.md
            docs/release-notes/
            release-notes.txt
          retention-days: 1

  # Job 2: Run tests with calculated version
  test:
    name: Run Tests
    needs: [version]
    runs-on: ubuntu-latest
    if: false  # DISABLED FOR TESTING
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Create .env file
        run: echo "API_KEY=${{ secrets.API_KEY }}" > .env

      - name: Decode Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" | base64 -d > composeApp/google-services.json

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: "**/build/test-results/**/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true

  # Job 3: Commit version ONLY after tests pass
  commit:
    name: Commit Version & Tag
    needs: [version, test]
    runs-on: ubuntu-latest
    if: false  # DISABLED FOR TESTING
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Commit version changes
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add version.properties CHANGELOG.md docs/release-notes/
          git commit -m "chore(release): bump version to ${{ needs.version.outputs.version_name }} [skip ci]"
          git tag -a "v${{ needs.version.outputs.version_name }}" -m "Release ${{ needs.version.outputs.version_name }}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${{ needs.version.outputs.version_name }}"

  # Job 4: Build APK (parallel, after commit)
  build-apk:
    name: Build Release APK
    needs: [version, commit]
    runs-on: ubuntu-latest
    if: false  # DISABLED FOR TESTING
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Create .env file
        run: echo "API_KEY=${{ secrets.API_KEY }}" > .env

      - name: Decode Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" | base64 -d > composeApp/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "KEYSTORE_FILE=$(pwd)/release.keystore" >> $GITHUB_ENV

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: composeApp/build/outputs/apk/release/*.apk
          retention-days: 90

  # Job 5: Build AAB (parallel with APK, after commit)
  build-aab:
    name: Build Release AAB
    needs: [version, commit]
    runs-on: ubuntu-latest
    if: false  # DISABLED FOR TESTING
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Create .env file
        run: echo "API_KEY=${{ secrets.API_KEY }}" > .env

      - name: Decode Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" | base64 -d > composeApp/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "KEYSTORE_FILE=$(pwd)/release.keystore" >> $GITHUB_ENV

      - name: Build Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload AAB and mapping
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: |
            composeApp/build/outputs/bundle/release/*.aab
            composeApp/build/outputs/mapping/release/mapping.txt
          retention-days: 90

  # Job 6: Build iOS (parallel with Android, after commit)
  build-ios:
    name: Build iOS Release (TESTING MEMORY OPTIMIZATION)
    # needs: [version, commit]  # DISABLED FOR TESTING
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # - name: Download version files  # DISABLED FOR TESTING
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: version-files

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper
          cache-read-only: false
          gradle-home-cache-cleanup: true

      - name: Cache Kotlin Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Create .env file
        run: echo "API_KEY=${{ secrets.API_KEY }}" > .env

      - name: Generate iOS Secrets.plist
        run: |
          chmod +x scripts/generate-ios-secrets.sh
          ./scripts/generate-ios-secrets.sh
          # Copy to where Xcode expects it during CI builds
          cp iosApp/iosApp/Secrets.plist iosApp/Secrets.plist

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Import Apple certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          # Install the provisioning profile directly from the secret
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Extract profile information for debugging and configuration
          PROFILE_CONTENT=$(security cms -D -i /tmp/profile.mobileprovision)
          PROFILE_UUID=$(echo "$PROFILE_CONTENT" | plutil -extract UUID xml1 - -o - | xmllint --xpath "//string/text()" -)
          PROFILE_NAME=$(echo "$PROFILE_CONTENT" | plutil -extract Name xml1 - -o - | xmllint --xpath "//string/text()" -)
          
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "Provisioning profile UUID: $PROFILE_UUID"
          echo "Provisioning profile Name: $PROFILE_NAME"

      # - name: Update Info.plist version  # DISABLED FOR TESTING
      #   run: |
      #     # Read version from version files
      #     VERSION_NAME="${{ needs.version.outputs.version_name }}"
      #     VERSION_CODE="${{ needs.version.outputs.version_code }}"
      #     
      #     # Extract marketing version (without build number suffix)
      #     MARKETING_VERSION=$(echo $VERSION_NAME | sed 's/-b[0-9]*$//')
      #     
      #     # Update Info.plist
      #     /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $MARKETING_VERSION" iosApp/iosApp/Info.plist
      #     /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION_CODE" iosApp/iosApp/Info.plist

      - name: Build iOS app and framework
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          # Optimized Gradle memory settings for Kotlin framework compilation
          # These are used by Xcode's "Compile Kotlin Framework" build phase
          GRADLE_OPTS: "-Xmx6144M -XX:MaxMetaspaceSize=512M -XX:+UseG1GC -XX:SoftRefLRUPolicyMSPerMB=1 -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
        run: |
          cd iosApp
          
          # Update Config.xcconfig with team and bundle ID
          cat > Configuration/Config.xcconfig << EOF
          TEAM_ID=$TEAM_ID
          BUNDLE_ID=$BUNDLE_ID
          APP_NAME=SpaceLaunchNow
          EOF
          
          # Build archive with optimized xcodebuild flags
          # The Kotlin framework will be built automatically by Xcode's "Compile Kotlin Framework" build phase
          # which calls: ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
          # DISABLED FOR TESTING - Skip the actual build and create mock archive
          echo "SKIPPING BUILD FOR TESTING - Creating mock archive directory"
          mkdir -p "$RUNNER_TEMP/Build/Archives/SpaceLaunchNow.xcarchive"
          
          # Find the correct certificate identity for debugging
          CERT_IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -n1 | grep -o '"[^"]*"' | tr -d '"')
          echo "Using certificate identity: $CERT_IDENTITY"
          
          # xcrun xcodebuild \
          #   -project iosApp.xcodeproj \
          #   -scheme iosApp \
          #   -configuration Release \
          #   -sdk iphoneos \
          #   -parallelizeTargets \
          #   -showBuildTimingSummary \
          #   -disableAutomaticPackageResolution \
          #   -derivedDataPath "$RUNNER_TEMP/Build/DerivedData" \
          #   -archivePath "$RUNNER_TEMP/Build/Archives/SpaceLaunchNow.xcarchive" \
          #   -resultBundlePath "$RUNNER_TEMP/Build/Artifacts/SpaceLaunchNow.xcresult" \
          #   -destination "generic/platform=iOS" \
          #   DEVELOPMENT_TEAM="$TEAM_ID" \
          #   PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
          #   CODE_SIGN_STYLE="Manual" \
          #   PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID" \
          #   CODE_SIGN_IDENTITY="$CERT_IDENTITY" \
          #   archive

      - name: Export IPA
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }}
        run: |
          # Create export options plist from base64 secret
          echo "$EXPORT_OPTIONS_PLIST" | base64 --decode > $RUNNER_TEMP/ExportOptions.plist
          
          # Debug: Show the export options we're using
          echo "Export Options Plist contents:"
          cat $RUNNER_TEMP/ExportOptions.plist
          
          # Debug: List all installed provisioning profiles
          echo "Installed provisioning profiles:"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          
          # Debug: Show details of installed profiles
          echo "Profile details:"
          for profile in ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision; do
            if [ -f "$profile" ]; then
              echo "Profile: $profile"
              security cms -D -i "$profile" | plutil -extract Name xml1 - -o - | xmllint --xpath "//string/text()" - 2>/dev/null || echo "Could not extract name"
              security cms -D -i "$profile" | plutil -extract UUID xml1 - -o - | xmllint --xpath "//string/text()" - 2>/dev/null || echo "Could not extract UUID"
              echo "---"
            fi
          done
          
          # Export archive to IPA - re-enabled for testing
          echo "EXPORTING WITH THESE OPTIONS:"
          echo "Archive path: $RUNNER_TEMP/Build/Archives/SpaceLaunchNow.xcarchive"
          echo "Export path: $RUNNER_TEMP/Build/Archives/"
          echo "Export options file: $RUNNER_TEMP/ExportOptions.plist"
          
          # Note: This will fail because we don't have a real archive, but let's see the error
          xcrun xcodebuild \
            -exportArchive \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -archivePath "$RUNNER_TEMP/Build/Archives/SpaceLaunchNow.xcarchive" \
            -exportPath "$RUNNER_TEMP/Build/Archives/" || echo "Export failed as expected (no real archive)"
          
          # Create mock IPA for subsequent steps
          mkdir -p "$RUNNER_TEMP/Build/Archives/"
          echo "mock ipa content" > "$RUNNER_TEMP/Build/Archives/SpaceLaunchNow.ipa"
          echo "ipa_path=$RUNNER_TEMP/Build/Archives/SpaceLaunchNow.ipa" >> $GITHUB_ENV

      - name: Decode API key for TestFlight
        run: |
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" | base64 --decode > /tmp/api_key.p8
          # Store the decoded content in a way the action can use
          printf '%s\n' "API_KEY_CONTENT<<EOFAPIKEY" "$(cat /tmp/api_key.p8)" "EOFAPIKEY" >> $GITHUB_ENV

      # DISABLED FOR TESTING - TestFlight upload works, focusing on provisioning profiles
      # - name: Upload to TestFlight
      #   uses: Apple-Actions/upload-testflight-build@v1
      #   with:
      #     app-path: ${{ env.ipa_path }}
      #     issuer-id: ${{ secrets.APPLE_API_ISSUER_ID }}
      #     api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
      #     api-private-key: ${{ env.API_KEY_CONTENT }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: ${{ env.ipa_path }}
          retention-days: 90

  # Job 7: Deploy to Firebase and GitHub (after all builds complete)
  deploy:
    name: Deploy Release
    needs: [version, build-apk, build-aab, build-ios]
    runs-on: ubuntu-latest
    if: false  # DISABLED FOR TESTING
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: apk/

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: aab/

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: ipa/

      - name: Resolve artifact paths
        id: artifacts
        run: |
          APK_PATH=$(ls apk/*.apk | head -n 1)
          AAB_PATH=$(ls aab/*.aab | head -n 1)
          MAPPING_PATH=$(ls aab/mapping.txt | head -n 1)
          IPA_PATH=$(ls ipa/*.ipa | head -n 1)
          echo "apk=$APK_PATH" >> $GITHUB_OUTPUT
          echo "aab=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "mapping=$MAPPING_PATH" >> $GITHUB_OUTPUT
          echo "ipa=$IPA_PATH" >> $GITHUB_OUTPUT

      - name: Decode Service Account
        env:
          PLAY_CONSOLE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_CONSOLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$PLAY_CONSOLE_SERVICE_ACCOUNT_JSON" | base64 -d > service-account.json

      - name: Deploy AAB to Firebase Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFile: service-account.json
          groups: vip_testers
          file: ${{ steps.artifacts.outputs.aab }}
          releaseNotes: |
            🚀 Space Launch Now ${{ needs.version.outputs.version_name }} (AAB)
            
            ${{ needs.version.outputs.changelog }}
            
            See full details at: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version.outputs.version_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.version_name }}
          name: "🚀 Space Launch Now ${{ needs.version.outputs.version_name }}"
          body_path: release-notes.txt
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.apk }}
            ${{ steps.artifacts.outputs.ipa }}
            ${{ steps.artifacts.outputs.mapping }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Code:** ${{ needs.version.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Success ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Release APK (Android)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Release AAB (Android)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Release IPA (iOS)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ProGuard Mapping" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Deployments" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Firebase Distribution (Android AAB)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ TestFlight (iOS)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
