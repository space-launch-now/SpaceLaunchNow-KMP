name: Initialize Match (run once, then delete)

# Trigger manually from Actions tab. Delete this workflow after successful run.
on:
  workflow_dispatch:

jobs:
  init-match:
    name: Generate and upload certs to Match repo
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH for Match certificates repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MATCH_GIT_PRIVATE_KEY }}" > ~/.ssh/match_key
          chmod 600 ~/.ssh/match_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'EOF'
          Host github.com
            IdentityFile ~/.ssh/match_key
            IdentitiesOnly yes
          EOF
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/match_key
          ssh -T git@github.com 2>&1 || true
          echo "✅ SSH configured for Match certificates repo"

      - name: Install Fastlane
        run: |
          cd iosApp
          bundle install
          echo "✅ Fastlane installed"

      - name: Initialize Match certificates (appstore)
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          cd iosApp
          bundle exec fastlane init_certificates
          echo "✅ Match initialized — certificates and profiles stored in certificates repo"
          echo "👉 Next: delete this workflow"
