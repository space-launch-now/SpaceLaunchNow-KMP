name: PR Validation

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: write  # Required for dependency graph submission
  checks: write
  pull-requests: write

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest-8-core  # Use larger runner (if available on your plan)
    
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Dorg.gradle.caching=true -Dkotlin.incremental=true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Use wrapper version for consistency
          gradle-version: wrapper
          
          # Optimize caching for PR builds
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          cache-cleanup: on-success
          cache-overwrite-existing: false
          
          # Wrapper validation (enabled by default in v4+)
          validate-wrappers: true
          
          # Job summary optimization
          add-job-summary: on-failure
          
          # Dependency graph for security (read-only for PRs)
          dependency-graph: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' && 'generate-and-submit' || 'disabled' }}

      - name: Create .env file
        run: |
          cat > .env << EOF
          API_KEY=${{ secrets.API_KEY }}
          REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }}
          REVENUECAT_IOS_KEY=${{ secrets.REVENUECAT_IOS_KEY }}
          ANDROID_BANNER_AD_UNIT_ID=${{ secrets.ANDROID_BANNER_AD_UNIT_ID }}
          IOS_BANNER_AD_UNIT_ID=${{ secrets.IOS_BANNER_AD_UNIT_ID }}
          ANDROID_INTERSTITIAL_AD_UNIT_ID=${{ secrets.ANDROID_INTERSTITIAL_AD_UNIT_ID }}
          IOS_INTERSTITIAL_AD_UNIT_ID=${{ secrets.IOS_INTERSTITIAL_AD_UNIT_ID }}
          ANDROID_REWARDED_AD_UNIT_ID=${{ secrets.ANDROID_REWARDED_AD_UNIT_ID }}
          IOS_REWARDED_AD_UNIT_ID=${{ secrets.IOS_REWARDED_AD_UNIT_ID }}
          DATADOG_ENABLED=${{ secrets.DATADOG_ENABLED }}
          DATADOG_CLIENT_TOKEN=${{ secrets.DATADOG_CLIENT_TOKEN }}
          DATADOG_APPLICATION_ID=${{ secrets.DATADOG_APPLICATION_ID }}
          DATADOG_ENVIRONMENT=${{ secrets.DATADOG_ENVIRONMENT }}
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
          ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}
          TOTP_SECRET=${{ secrets.TOTP_SECRET_BASE32 }}
          DEBUG=true
          EOF

      - name: Decode Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: |
          echo "$FIREBASE_GOOGLE_SERVICES_JSON" | base64 -d > composeApp/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check code formatting & Run tests
        run: ./gradlew :composeApp:lint test --parallel --continue
        continue-on-error: true

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Build Debug APK (parallel)
        run: ./gradlew :composeApp:assembleDebug --parallel --build-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const message = `✅ **Build Validation Passed**
            
            - JDK 21 Setup: ✓
            - Code Formatting: ✓
            - Unit Tests: ✓
            - Debug APK Build: ✓
            
            Artifacts are available in the workflow run.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });