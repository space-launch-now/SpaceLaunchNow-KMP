name: PR Validation

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest-8-core  # Use larger runner (if available on your plan)
    
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Dorg.gradle.caching=true -Dkotlin.incremental=true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: wrapper
          cache-read-only: false
          # Enable additional caching
          gradle-home-cache-cleanup: true
          cache-overwrite-existing: false
          # Cache Kotlin compilation outputs
          add-job-summary: false
          
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
            ~/.android/avd
          key: android-sdk-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-
            
      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches/kotlin-*
          key: kotlin-native-${{ runner.os }}-${{ hashFiles('**/build.gradle*') }}
          restore-keys: |
            kotlin-native-${{ runner.os }}-

      - name: Create .env file
        run: |
          cat > .env << EOF
          API_KEY=${{ secrets.API_KEY }}
          REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }}
          REVENUECAT_IOS_KEY=${{ secrets.REVENUECAT_IOS_KEY }}
          ANDROID_BANNER_AD_UNIT_ID=${{ secrets.ANDROID_BANNER_AD_UNIT_ID }}
          IOS_BANNER_AD_UNIT_ID=${{ secrets.IOS_BANNER_AD_UNIT_ID }}
          ANDROID_INTERSTITIAL_AD_UNIT_ID=${{ secrets.ANDROID_INTERSTITIAL_AD_UNIT_ID }}
          IOS_INTERSTITIAL_AD_UNIT_ID=${{ secrets.IOS_INTERSTITIAL_AD_UNIT_ID }}
          ANDROID_REWARDED_AD_UNIT_ID=${{ secrets.ANDROID_REWARDED_AD_UNIT_ID }}
          IOS_REWARDED_AD_UNIT_ID=${{ secrets.IOS_REWARDED_AD_UNIT_ID }}
          DATADOG_ENABLED=${{ secrets.DATADOG_ENABLED }}
          DATADOG_CLIENT_TOKEN=${{ secrets.DATADOG_CLIENT_TOKEN }}
          DATADOG_APPLICATION_ID=${{ secrets.DATADOG_APPLICATION_ID }}
          DATADOG_ENVIRONMENT=${{ secrets.DATADOG_ENVIRONMENT }}
          EOF

      - name: Decode Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: |
          echo "$FIREBASE_GOOGLE_SERVICES_JSON" | base64 -d > composeApp/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Pre-compile dependencies
        run: ./gradlew compileKotlin compileTestKotlin --parallel

      - name: Check code formatting
        run: ./gradlew ktlintCheck --parallel
        continue-on-error: true

      - name: Run unit tests
        run: ./gradlew test --parallel --continue

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: '**/build/test-results/**/TEST-*.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Build Debug APK (parallel)
        run: ./gradlew :composeApp:assembleDebug --parallel --build-cache

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: composeApp/build/outputs/apk/debug/composeApp-debug.apk
          retention-days: 7

      - name: Build Desktop JAR
        run: ./gradlew :composeApp:packageUberJarForCurrentOS
        continue-on-error: true

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const message = `✅ **Build Validation Passed**
            
            - JDK 21 Setup: ✓
            - Code Formatting: ✓
            - Unit Tests: ✓
            - Debug APK Build: ✓
            
            Artifacts are available in the workflow run.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });