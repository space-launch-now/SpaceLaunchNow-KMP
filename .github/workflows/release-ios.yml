name: Release iOS (Manual)

on:
  workflow_dispatch:
    inputs:
      deploy_to:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - testflight
          - artifacts-only
        default: 'testflight'

env:
  CI: true

jobs:
  build-ios:
    name: Build & Deploy iOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Cache Kotlin Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Create .env file
        run: |
          cat > .env << EOF
          API_KEY=${{ secrets.API_KEY }}
          REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }}
          REVENUECAT_IOS_KEY=${{ secrets.REVENUECAT_IOS_KEY }}
          ANDROID_BANNER_AD_UNIT_ID=${{ secrets.ANDROID_BANNER_AD_UNIT_ID }}
          IOS_BANNER_AD_UNIT_ID=${{ secrets.IOS_BANNER_AD_UNIT_ID }}
          ANDROID_INTERSTITIAL_AD_UNIT_ID=${{ secrets.ANDROID_INTERSTITIAL_AD_UNIT_ID }}
          IOS_INTERSTITIAL_AD_UNIT_ID=${{ secrets.IOS_INTERSTITIAL_AD_UNIT_ID }}
          ANDROID_REWARDED_AD_UNIT_ID=${{ secrets.ANDROID_REWARDED_AD_UNIT_ID }}
          IOS_REWARDED_AD_UNIT_ID=${{ secrets.IOS_REWARDED_AD_UNIT_ID }}
          DATADOG_ENABLED=${{ secrets.DATADOG_ENABLED }}
          DATADOG_CLIENT_TOKEN=${{ secrets.DATADOG_CLIENT_TOKEN }}
          DATADOG_APPLICATION_ID=${{ secrets.DATADOG_APPLICATION_ID }}
          DATADOG_ENVIRONMENT=${{ secrets.DATADOG_ENVIRONMENT }}
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
          TOTP_SECRET=${{ secrets.TOTP_SECRET_BASE32 }}
          DEBUG=false
          EOF

      - name: Generate iOS Secrets.plist
        run: |
          chmod +x scripts/generate-ios-secrets.sh
          ./scripts/generate-ios-secrets.sh

      - name: Decode GoogleService-Info.plist
        env:
          FIREBASE_GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.FIREBASE_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo "$FIREBASE_GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > iosApp/iosApp/GoogleService-Info.plist
          echo "✅ GoogleService-Info.plist installed"

      # ==================== VERSION INFO ====================
      - name: Read version from version.properties
        id: version
        run: |
          VERSION_MAJOR=$(grep "versionMajor=" version.properties | cut -d'=' -f2)
          VERSION_MINOR=$(grep "versionMinor=" version.properties | cut -d'=' -f2)
          VERSION_PATCH=$(grep "versionPatch=" version.properties | cut -d'=' -f2)
          BUILD_NUMBER=$(grep "versionBuildNumber=" version.properties | cut -d'=' -f2)
          
          VERSION_NAME="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          FULL_VERSION="${VERSION_NAME}-b${BUILD_NUMBER}"
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          
          echo "Building iOS version: $FULL_VERSION"

      # ==================== XCODE SETUP ====================
      # For self-hosted runners, Xcode must be pre-installed
      # This step just verifies and selects the version
      - name: Select Xcode version
        run: |
          # Use latest installed Xcode on self-hosted runner
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          echo "✅ Using Xcode version:"
          xcodebuild -version

      # ==================== CODE SIGNING ====================
      - name: Clean up existing keychains
        run: |
          # Remove any existing temporary keychains from previous runs
          security list-keychains | grep -o 'signing_temp.*\.keychain' | while read keychain; do
            echo "🧹 Removing existing keychain: $keychain"
            security delete-keychain "$keychain" || true
          done
          echo "✅ Keychain cleanup complete"

      - name: Import Apple certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          keychain: signing_temp_${{ github.run_id }}
          create-keychain: true

      - name: Setup App Store Connect API Key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          # Save API key for automatic provisioning profile download
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$APPLE_API_KEY_CONTENT" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          
          echo "✅ App Store Connect API Key configured for automatic code signing"
          echo "   Key ID: ${{ secrets.APPLE_API_KEY_ID }}"
          echo "   Issuer ID: ${{ secrets.APPLE_API_ISSUER_ID }}"

      - name: Update Info.plist version
        run: |
          MARKETING_VERSION="${{ steps.version.outputs.version_name }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $MARKETING_VERSION" iosApp/iosApp/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" iosApp/iosApp/Info.plist
          
          echo "✅ Updated iOS version to $MARKETING_VERSION (Build $BUILD_NUMBER)"

      - name: Commit updated iOS version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iosApp/iosApp/Info.plist iosApp/Secrets.plist
          git diff --staged --quiet || git commit -m "chore(ios): update Info.plist to ${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.build_number }}) [skip ci]"
          git push

      # ==================== BUILD ====================
      - name: Build iOS archive with automatic code signing
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          cd iosApp
          
          echo "Building archive with automatic code signing via App Store Connect API..."
          echo "Team ID: $TEAM_ID"
          echo "Bundle ID: $BUNDLE_ID"
          
          # Clean any existing derived data that might have conflicting certificates
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
          
          # Build archive - xcodebuild will automatically download provisioning profiles
          set -o pipefail
          xcrun xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/SpaceLaunchNow.xcarchive" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_API_ISSUER_ID }} \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            -verbose \
            archive
          
          if [ -d "$RUNNER_TEMP/SpaceLaunchNow.xcarchive" ]; then
            echo "✅ Archive created successfully"
          else
            echo "❌ Archive creation failed"
            exit 1
          fi

      - name: Export IPA for App Store
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create export options plist for automatic signing
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
          </dict>
          </plist>
          EOF
          
          echo "Exporting IPA with automatic provisioning..."
          
          # Export IPA - will automatically use the correct provisioning profiles
          xcrun xcodebuild \
            -exportArchive \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -archivePath "$RUNNER_TEMP/SpaceLaunchNow.xcarchive" \
            -exportPath "$RUNNER_TEMP/Export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_API_ISSUER_ID }} \
            | xcpretty || true
          
          # Find the IPA (xcodebuild exports to a folder with the app name)
          IPA_PATH=$(find "$RUNNER_TEMP/Export" -name "*.ipa" -type f | head -n 1)
          
          if [ -z "$IPA_PATH" ]; then
            echo "❌ Error: IPA file not found!"
            exit 1
          fi
          
          echo "✅ IPA exported successfully: $IPA_PATH"
          echo "ipa_path=$IPA_PATH" >> $GITHUB_ENV

      - name: Validate IPA
        run: |
          echo "🔍 Validating IPA..."
          
          # Extract and validate IPA contents
          unzip -l "${{ env.ipa_path }}" | head -20
          
          # Get IPA size
          IPA_SIZE=$(du -h "${{ env.ipa_path }}" | cut -f1)
          echo "📦 IPA Size: $IPA_SIZE"
          
          echo "✅ IPA validation complete"

      # ==================== DEPLOY ====================
      - name: Upload to TestFlight
        if: inputs.deploy_to == 'testflight'
        run: |
          echo "📤 Uploading to TestFlight..."
          
          # Use App Store Connect API for TestFlight upload
          # This is faster and more reliable than altool
          xcrun altool --upload-app \
            --type ios \
            --file "${{ env.ipa_path }}" \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER_ID }}" \
            --api-private-keys-path ~/.appstoreconnect/private_keys
          
          echo "✅ Successfully uploaded to TestFlight!"
          echo "📱 Build will be available for testing once it completes processing"

      # ==================== ARTIFACTS ====================
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-v${{ steps.version.outputs.full_version }}
          path: ${{ env.ipa_path }}
          retention-days: 90

      - name: Deployment Summary
        run: |
          echo "### 🍎 iOS Release Built Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version Information:**" >> $GITHUB_STEP_SUMMARY
          echo "- Marketing Version: ${{ steps.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Number: ${{ steps.version.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Full Version: ${{ steps.version.outputs.full_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "**Build Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- Code Signing: ✅ Automatic (via App Store Connect API)" >> $GITHUB_STEP_SUMMARY
          echo "- Xcode Version: 16.2" >> $GITHUB_STEP_SUMMARY
          echo "- Configuration: Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.deploy_to }}" = "testflight" ]; then
            echo "**Deployment Status:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Uploaded to TestFlight" >> $GITHUB_STEP_SUMMARY
            echo "- 💾 IPA available in workflow artifacts" >> $GITHUB_STEP_SUMMARY
            echo "- 📱 Build will be available for testing after App Store Connect processing" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note:** GitHub releases are created by the main Android workflow. iOS builds are deployed directly to TestFlight." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Build Status:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ IPA built successfully" >> $GITHUB_STEP_SUMMARY
            echo "- ⏸️  TestFlight upload skipped (artifacts-only mode)" >> $GITHUB_STEP_SUMMARY
            echo "- 💾 IPA available in workflow artifacts" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cost Estimate:** ~\$6.00 (30 min macOS build time)" >> $GITHUB_STEP_SUMMARY

      # ==================== CLEANUP ====================
      - name: Clean up keychains
        if: always()
        run: |
          echo "🧹 Cleaning up temporary keychains..."
          # Remove the specific keychain created for this run
          security delete-keychain "signing_temp_${{ github.run_id }}.keychain" || true
          # Clean up any other temporary keychains that might be left over
          security list-keychains | grep -o 'signing_temp.*\.keychain' | while read keychain; do
            echo "Removing leftover keychain: $keychain"
            security delete-keychain "$keychain" || true
          done
          echo "✅ Keychain cleanup complete"
