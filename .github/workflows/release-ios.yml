name: Release iOS (Manual)

on:
  workflow_dispatch:
    inputs:
      deploy_to:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - testflight
          - artifacts-only
        default: 'testflight'

env:
  CI: true

jobs:
  build-ios:
    name: Build & Deploy iOS
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Cache Kotlin Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Create .env file
        run: |
          cat > .env << EOF
          API_KEY=${{ secrets.API_KEY }}
          REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }}
          REVENUECAT_IOS_KEY=${{ secrets.REVENUECAT_IOS_KEY }}
          EOF

      - name: Generate iOS Secrets.plist
        run: |
          chmod +x scripts/generate-ios-secrets.sh
          ./scripts/generate-ios-secrets.sh
          cp iosApp/iosApp/Secrets.plist iosApp/Secrets.plist

      - name: Decode GoogleService-Info.plist
        env:
          FIREBASE_GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.FIREBASE_GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          echo "$FIREBASE_GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > iosApp/iosApp/GoogleService-Info.plist
          echo "✅ GoogleService-Info.plist installed"

      # ==================== VERSION INFO ====================
      - name: Read version from version.properties
        id: version
        run: |
          VERSION_MAJOR=$(grep "versionMajor=" version.properties | cut -d'=' -f2)
          VERSION_MINOR=$(grep "versionMinor=" version.properties | cut -d'=' -f2)
          VERSION_PATCH=$(grep "versionPatch=" version.properties | cut -d'=' -f2)
          BUILD_NUMBER=$(grep "versionBuildNumber=" version.properties | cut -d'=' -f2)
          
          VERSION_NAME="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          FULL_VERSION="${VERSION_NAME}-b${BUILD_NUMBER}"
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          
          echo "Building iOS version: $FULL_VERSION"

      # ==================== XCODE SETUP ====================
      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Import Apple certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          
          # Extract profile info
          PROFILE_CONTENT=$(security cms -D -i /tmp/profile.mobileprovision)
          PROFILE_UUID=$(echo "$PROFILE_CONTENT" | plutil -extract UUID xml1 - -o - | xmllint --xpath "//string/text()" -)
          PROFILE_NAME=$(echo "$PROFILE_CONTENT" | plutil -extract Name xml1 - -o - | xmllint --xpath "//string/text()" -)
          
          echo "Installing provisioning profile:"
          echo "  Name: $PROFILE_NAME"
          echo "  UUID: $PROFILE_UUID"
          
          # Install with UUID filename (CRITICAL!)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV

      - name: Update Info.plist version
        run: |
          MARKETING_VERSION="${{ steps.version.outputs.version_name }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $MARKETING_VERSION" iosApp/iosApp/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" iosApp/iosApp/Info.plist
          
          echo "✅ Updated iOS version to $MARKETING_VERSION (Build $BUILD_NUMBER)"

      # ==================== BUILD ====================
      - name: Build iOS archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          GRADLE_OPTS: "-Xmx6144M -XX:MaxMetaspaceSize=512M -XX:+UseG1GC -XX:SoftRefLRUPolicyMSPerMB=1 -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
        run: |
          cd iosApp
          
          # Create config
          cat > Configuration/Config.xcconfig << EOF
          TEAM_ID=$TEAM_ID
          BUNDLE_ID=$BUNDLE_ID
          APP_NAME=SpaceLaunchNow
          EOF
          
          # Find certificate identity
          CERT_IDENTITY=$(security find-identity -v -p codesigning | grep -E "(Apple Distribution|iOS Distribution)" | head -n1 | grep -o '"[^"]*"' | tr -d '"')
          
          if [ -z "$CERT_IDENTITY" ]; then
            CERT_IDENTITY=$(security find-identity -v -p codesigning | grep -iE "(distribution|production)" | head -n1 | grep -o '"[^"]*"' | tr -d '"')
          fi
          
          echo "Using certificate: $CERT_IDENTITY"
          
          # Build archive
          xcrun xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/Build/Archives/SpaceLaunchNow.xcarchive" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE="Manual" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_UUID" \
            CODE_SIGN_IDENTITY="$CERT_IDENTITY" \
            archive

      - name: Export IPA
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }}
        run: |
          echo "$EXPORT_OPTIONS_PLIST" | base64 --decode > $RUNNER_TEMP/ExportOptions.plist
          
          xcrun xcodebuild \
            -exportArchive \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -archivePath "$RUNNER_TEMP/Build/Archives/SpaceLaunchNow.xcarchive" \
            -exportPath "$RUNNER_TEMP/Build/Export/"
          
          echo "ipa_path=$RUNNER_TEMP/Build/Export/SpaceLaunchNow.ipa" >> $GITHUB_ENV

      # ==================== DEPLOY ====================
      - name: Upload to TestFlight
        if: inputs.deploy_to == 'testflight'
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
        run: |
          # Decode and save API key
          printf '%s' "$APPLE_API_KEY_CONTENT" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          
          echo "Uploading to TestFlight..."
          
          # Upload to TestFlight
          xcrun altool --upload-app \
            --type ios \
            --file "${{ env.ipa_path }}" \
            --apiKey "${{ secrets.APPLE_API_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_API_ISSUER_ID }}" \
            --api-private-keys-path "$RUNNER_TEMP"
          
          echo "✅ Uploaded to TestFlight successfully!"

      # ==================== GITHUB RELEASE ====================
      - name: Update GitHub Release with iOS build
        if: inputs.deploy_to == 'testflight'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.full_version }}
          name: 🚀 Space Launch Now ${{ steps.version.outputs.full_version }}
          files: |
            ${{ env.ipa_path }}
          draft: false
          prerelease: true  # Mark as pre-release while in development

      # ==================== ARTIFACTS ====================
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-v${{ steps.version.outputs.full_version }}
          path: ${{ env.ipa_path }}
          retention-days: 90

      - name: Deployment Summary
        run: |
          echo "### 🍎 iOS Release Built!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.full_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Marketing Version:** ${{ steps.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build Number:** ${{ steps.version.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.deploy_to }}" = "testflight" ]; then
            echo "**Deployed to:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ TestFlight" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ GitHub Release (updated)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ IPA built successfully" >> $GITHUB_STEP_SUMMARY
            echo "- ⏸️  TestFlight upload skipped" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cost:** ~$6.00 (30 min build)" >> $GITHUB_STEP_SUMMARY
