name: Release Android (Auto on Master)

on:
  push:
    branches: [master, main]
  workflow_dispatch:  # Can also trigger manually

env:
  CI: true

permissions:
  contents: write
  checks: write

jobs:
  version-and-build:
    name: Version Bump & Android Release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # ==================== VERSION BUMP ====================
      - name: Bump version based on conventional commits
        id: bump_version
        run: |
          # Read current version
          VERSION_MAJOR=$(grep "versionMajor=" version.properties | cut -d'=' -f2)
          VERSION_MINOR=$(grep "versionMinor=" version.properties | cut -d'=' -f2)
          VERSION_PATCH=$(grep "versionPatch=" version.properties | cut -d'=' -f2)
          BUILD_NUMBER=$(grep "versionBuildNumber=" version.properties | cut -d'=' -f2)
          
          echo "Current version: $VERSION_MAJOR.$VERSION_MINOR.$VERSION_PATCH-b$BUILD_NUMBER"
          
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" $LAST_TAG..HEAD)
          fi
          
          echo "Commits to analyze:"
          echo "$COMMITS"
          
          # Determine bump type
          BUMP_TYPE="patch"
          
          if echo "$COMMITS" | grep -qE "^feat!:|^fix!:|^refactor!:|BREAKING CHANGE:"; then
            BUMP_TYPE="major"
          elif echo "$COMMITS" | grep -qE "^feat:"; then
            BUMP_TYPE="minor"
          fi
          
          echo "Bump type: $BUMP_TYPE"
          
          # Apply version bump
          if [ "$BUMP_TYPE" = "major" ]; then
            VERSION_MAJOR=$((VERSION_MAJOR + 1))
            VERSION_MINOR=0
            VERSION_PATCH=0
          elif [ "$BUMP_TYPE" = "minor" ]; then
            VERSION_MINOR=$((VERSION_MINOR + 1))
            VERSION_PATCH=0
          else
            VERSION_PATCH=$((VERSION_PATCH + 1))
          fi
          
          # Always increment build number
          BUILD_NUMBER=$((BUILD_NUMBER + 1))
          
          NEW_VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          VERSION_NAME="${NEW_VERSION}-b${BUILD_NUMBER}"
          
          # Calculate version code: (major * 1,000,000) + (minor * 100,000) + (patch * 10,000) + buildNumber
          VERSION_CODE=$((VERSION_MAJOR * 1000000 + VERSION_MINOR * 100000 + VERSION_PATCH * 10000 + BUILD_NUMBER))
          
          echo "New version: $VERSION_NAME (versionCode: $VERSION_CODE)"
          
          # Update version.properties
          sed -i "s/^version=.*/version=$NEW_VERSION/" version.properties
          sed -i "s/^versionMajor=.*/versionMajor=$VERSION_MAJOR/" version.properties
          sed -i "s/^versionMinor=.*/versionMinor=$VERSION_MINOR/" version.properties
          sed -i "s/^versionPatch=.*/versionPatch=$VERSION_PATCH/" version.properties
          sed -i "s/^versionBuildNumber=.*/versionBuildNumber=$BUILD_NUMBER/" version.properties
          
          # Set outputs
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      # ==================== CHANGELOG ====================
      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%h %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%h %s" $LAST_TAG..HEAD)
          fi
          
          # Generate changelog sections
          BREAKING_CHANGES=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ (feat!:|fix!:|refactor!:)" || true)
          FEATURES=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ feat:" | grep -v "!" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ fix:" | grep -v "!" || true)
          CHORES=$(echo "$COMMITS" | grep -E "^[a-f0-9]+ (chore:|docs:|style:|refactor:|perf:|test:|ci:)" || true)
          
          # Build release notes
          RELEASE_NOTES="## 🚀 Version ${{ steps.bump_version.outputs.version_name }}\n\n"
          
          if [ -n "$BREAKING_CHANGES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}### 💥 Breaking Changes\n"
            while IFS= read -r line; do
              RELEASE_NOTES="${RELEASE_NOTES}- 💥 ${line}\n"
            done <<< "$BREAKING_CHANGES"
            RELEASE_NOTES="${RELEASE_NOTES}\n"
          fi
          
          if [ -n "$FEATURES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}### ✨ New Features\n"
            while IFS= read -r line; do
              RELEASE_NOTES="${RELEASE_NOTES}- ✨ ${line}\n"
            done <<< "$FEATURES"
            RELEASE_NOTES="${RELEASE_NOTES}\n"
          fi
          
          if [ -n "$FIXES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}### 🐛 Bug Fixes\n"
            while IFS= read -r line; do
              RELEASE_NOTES="${RELEASE_NOTES}- 🐛 ${line}\n"
            done <<< "$FIXES"
            RELEASE_NOTES="${RELEASE_NOTES}\n"
          fi
          
          if [ -n "$CHORES" ]; then
            RELEASE_NOTES="${RELEASE_NOTES}### 🔧 Maintenance\n"
            while IFS= read -r line; do
              RELEASE_NOTES="${RELEASE_NOTES}- 🔧 ${line}\n"
            done <<< "$CHORES"
          fi
          
          # Save to file
          echo -e "$RELEASE_NOTES" > release-notes.txt
          
          # Update CHANGELOG.md
          if [ -f "CHANGELOG.md" ]; then
            TEMP_FILE=$(mktemp)
            echo -e "$RELEASE_NOTES\n---\n" > "$TEMP_FILE"
            cat CHANGELOG.md >> "$TEMP_FILE"
            mv "$TEMP_FILE" CHANGELOG.md
          else
            echo -e "$RELEASE_NOTES" > CHANGELOG.md
          fi
          
          # Save release notes for GitHub Release
          mkdir -p docs/release-notes
          echo -e "$RELEASE_NOTES" > "docs/release-notes/v${{ steps.bump_version.outputs.version_name }}.md"

      # ==================== COMMIT & TAG ====================
      - name: Commit version bump and changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add version.properties CHANGELOG.md docs/release-notes/
          git commit -m "chore(release): bump version to ${{ steps.bump_version.outputs.version_name }} [skip ci]"
          git tag -a "v${{ steps.bump_version.outputs.version_name }}" -m "Release v${{ steps.bump_version.outputs.version_name }}"

      # ==================== BUILD ANDROID ====================
      - name: Create .env file
        run: echo "API_KEY=${{ secrets.API_KEY }}" > .env

      - name: Decode Google Services
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: |
          echo "$FIREBASE_GOOGLE_SERVICES_JSON" | base64 --decode > composeApp/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Run unit tests
        run: ./gradlew :composeApp:testReleaseUnitTest

      - name: Generate test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Android Test Results
          path: '**/build/test-results/testReleaseUnitTest/*.xml'
          reporter: java-junit
          fail-on-error: true

      - name: Build Release APK
        env:
          VERSION_NAME: ${{ steps.bump_version.outputs.version_name }}
          VERSION_CODE: ${{ steps.bump_version.outputs.version_code }}
        run: |
          ./gradlew :composeApp:assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build Release AAB
        env:
          VERSION_NAME: ${{ steps.bump_version.outputs.version_name }}
          VERSION_CODE: ${{ steps.bump_version.outputs.version_code }}
        run: |
          ./gradlew :composeApp:bundleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # ==================== DEPLOY ====================
      - name: Deploy to Firebase Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.PLAY_CONSOLE_SERVICE_ACCOUNT_JSON }}
          groups: vip_testers
          file: composeApp/build/outputs/bundle/release/composeApp-release.aab
          releaseNotes: |
            🚀 Space Launch Now ${{ steps.bump_version.outputs.version_name }}
            
            Download the latest version from GitHub Releases:
            https://github.com/${{ github.repository }}/releases/tag/v${{ steps.bump_version.outputs.version_name }}

      # ==================== PUSH & RELEASE ====================
      - name: Push version bump and tags
        run: |
          git push origin HEAD:${{ github.ref }}
          git push origin "v${{ steps.bump_version.outputs.version_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump_version.outputs.version_name }}
          name: 🚀 Space Launch Now ${{ steps.bump_version.outputs.version_name }} (Android)
          body_path: release-notes.txt
          files: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/outputs/bundle/release/*.aab
            composeApp/build/outputs/mapping/release/mapping.txt
          draft: false
          prerelease: false

      # ==================== ARTIFACTS ====================
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-v${{ steps.bump_version.outputs.version_name }}
          path: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/outputs/bundle/release/*.aab
            composeApp/build/outputs/mapping/release/mapping.txt
          retention-days: 90

      - name: Deployment Summary
        run: |
          echo "### 🎉 Android Release Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.bump_version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Code:** ${{ steps.bump_version.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Bump Type:** ${{ steps.bump_version.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Firebase Distribution (vip_testers)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**iOS Release:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 Trigger manually via Actions → 'Release iOS' workflow" >> $GITHUB_STEP_SUMMARY
          echo "- 💡 Uses same version: ${{ steps.bump_version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
