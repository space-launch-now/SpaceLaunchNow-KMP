name: Master Deploy - Production Release (Parallel)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      deploy_to_play_store:
        description: 'Deploy to Google Play Store (Internal track). Disabled by default while Wear OS form factor is being set up manually.'
        required: false
        default: false
        type: boolean
      humanize_notes:
        description: 'Run release notes through GitHub Models to humanize them. Disable for raw conventional-commit output.'
        required: false
        default: true
        type: boolean

env:
  CI: true

permissions:
  contents: write
  checks: write
  pull-requests: write
  models: read

jobs:
  # Job 1: Calculate version (no commit yet)
  version:
    name: Calculate Version & Changelog
    runs-on: ubuntu-latest-8-core
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      changelog: ${{ steps.changelog.outputs.clean_changelog }}
      skipped: ${{ steps.changelog.outputs.skipped }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: "CHANGELOG.md"
          version-file: "./version.properties"
          version-path: "version"
          skip-version-file: "true"
          skip-commit: "true"
          skip-tag: "true"
          git-push: "false"
          tag-prefix: "v"

      - name: Calculate new version (no commit)
        id: version
        run: |
          NEW_VERSION="${{ steps.changelog.outputs.version }}"
          echo "📈 Using semantic version: $NEW_VERSION"
          
          BUILD_NUMBER=$(grep "versionBuildNumber=" version.properties | cut -d'=' -f2)
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          
          VERSION_MAJOR=$(echo $NEW_VERSION | cut -d'.' -f1)
          VERSION_MINOR=$(echo $NEW_VERSION | cut -d'.' -f2)
          VERSION_PATCH=$(echo $NEW_VERSION | cut -d'.' -f3 | cut -d'-' -f1)  # Strip any remaining suffixes
          
          VERSION_NAME="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}-b${NEW_BUILD_NUMBER}"
          VERSION_CODE=$((VERSION_MAJOR * 1000000 + VERSION_MINOR * 100000 + VERSION_PATCH * 10000 + NEW_BUILD_NUMBER))
          
          cat > version.properties << EOF
          # Version configuration for Space Launch Now KMP
          # Format: major.minor.patch-buildNumber
          version=${NEW_VERSION}
          versionMajor=${VERSION_MAJOR}
          versionMinor=${VERSION_MINOR}
          versionPatch=${VERSION_PATCH}
          versionBuildNumber=${NEW_BUILD_NUMBER}
          EOF
          
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Humanize Play Store notes (GitHub Models)
        id: ai_playstore
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.humanize_notes != 'false' }}
        uses: actions/ai-inference@v1
        continue-on-error: true
        with:
          model: openai/gpt-4o-mini
          max-tokens: 400
          system-prompt: |
            You write Google Play "What's new" release notes for an Android space-launch tracking app.
            Rules:
            - Output PLAIN TEXT only. No markdown, no headings, no asterisks, no backticks, no links.
            - Hard limit: 480 characters total.
            - Drop chore, refactor, ci, test, docs, build, style, deps commits entirely.
            - Drop commit hashes, scopes (e.g. "feat(ui):"), and the conventional-commit type prefix.
            - Use short, user-facing language. No technical jargon.
            - One item per line, prefixed with. Lead with the biggest user-visible win.
            - If nothing meaningful changed, output: "Bug fixes and performance improvements."
          prompt: |
            Raw changelog:
            ${{ steps.changelog.outputs.clean_changelog }}

      - name: Humanize GitHub Release notes (GitHub Models)
        id: ai_github
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.humanize_notes != 'false' }}
        uses: actions/ai-inference@v1
        continue-on-error: true
        with:
          model: openai/gpt-4o-mini
          max-tokens: 800
          system-prompt: |
            You write GitHub Release notes for an Android/iOS/Wear OS space-launch tracking app.
            Rules:
            - Output GitHub-flavored markdown.
            - Drop chore, refactor, ci, test, docs, build, style, deps commits entirely.
            - Drop commit hashes, scopes, and conventional-commit type prefixes.
            - Use these sections (omit empty ones), each as an H3:
              ### ✨ New
              ### 🚀 Improved
              ### 🐛 Fixed
            - Bullet items only. Short, user-facing language. No internal jargon.
            - Lead with the biggest user-visible win.
            - Do NOT add a title, date, or version line — the workflow adds those.
          prompt: |
            Raw changelog:
            ${{ steps.changelog.outputs.clean_changelog }}

      - name: Create release notes
        env:
          AI_PLAYSTORE: ${{ steps.ai_playstore.outputs.response }}
          AI_GITHUB: ${{ steps.ai_github.outputs.response }}
          RAW_CHANGELOG: ${{ steps.changelog.outputs.clean_changelog }}
        run: |
          mkdir -p docs/release-notes
          mkdir -p docs/release-notes/whatsnew

          # ---- GitHub Release body ----
          # Prefer humanized markdown; fall back to raw changelog if the AI step was skipped or failed.
          if [ -n "$AI_GITHUB" ]; then
            GITHUB_BODY="$AI_GITHUB"
            echo "✨ Using humanized GitHub release notes"
          else
            GITHUB_BODY="$RAW_CHANGELOG"
            echo "⚠️ Falling back to raw changelog for GitHub release"
          fi

          {
            echo "## 🚀 Space Launch Now ${{ steps.version.outputs.version_name }}"
            echo ""
            echo "**Release Date:** $(date +%Y-%m-%d)"
            echo "**Version Code:** ${{ steps.version.outputs.version_code }}"
            echo ""
            echo "$GITHUB_BODY"
            echo ""
            echo "---"
            echo "*This release was automatically created by GitHub Actions*"
          } > docs/release-notes/v${{ steps.version.outputs.version_name }}.md

          {
            echo "## 🚀 Space Launch Now ${{ steps.version.outputs.version_name }}"
            echo ""
            echo "**Release Date:** $(date +%Y-%m-%d)"
            echo "**Version Code:** ${{ steps.version.outputs.version_code }}"
            echo ""
            echo "$GITHUB_BODY"
          } > release-notes.txt

          # ---- Play Store "What's new" (≤500 chars, plain text) ----
          if [ -n "$AI_PLAYSTORE" ]; then
            # Trim to 500 chars hard cap (Play Store limit)
            printf '%s' "$AI_PLAYSTORE" | head -c 500 > docs/release-notes/whatsnew/whatsnew-en-US
            echo "✨ Using humanized Play Store notes"
          else
            # Fallback to existing script
            printf '%s' "$RAW_CHANGELOG" > /tmp/changelog-raw.txt
            chmod +x scripts/prepare-play-store-notes.sh
            scripts/prepare-play-store-notes.sh /tmp/changelog-raw.txt > docs/release-notes/whatsnew/whatsnew-en-US
            echo "⚠️ Falling back to raw changelog for Play Store notes"
          fi

          # Surface results in the workflow summary for review
          {
            echo "## 📝 Release Notes Preview"
            echo ""
            echo "### Play Store (whatsnew-en-US)"
            echo '```'
            cat docs/release-notes/whatsnew/whatsnew-en-US
            echo ''
            echo '```'
            echo ""
            echo "### GitHub Release body"
            echo ""
            cat release-notes.txt
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload version artifacts (not committed yet)
        uses: actions/upload-artifact@v4
        with:
          name: version-files
          path: |
            version.properties
            CHANGELOG.md
            docs/release-notes/
            release-notes.txt
          retention-days: 1

  # Job 2: Run tests with calculated version
  test:
    name: Run Tests
    needs: [ version ]
    runs-on: ubuntu-latest-8-core
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Use wrapper version for consistency
          gradle-version: wrapper
          
          # Main branch always writes to cache
          cache-read-only: false
          cache-cleanup: on-success
          cache-overwrite-existing: false
          
          # Wrapper validation (enabled by default in v4+)
          validate-wrappers: true
          
          # Full job summary for release builds
          add-job-summary: always
          
          # Dependency graph for security
          dependency-graph: generate-and-submit

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
            ~/.android/avd
          key: android-sdk-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches/kotlin-*
          key: kotlin-native-${{ runner.os }}-${{ hashFiles('**/build.gradle*') }}
          restore-keys: |
            kotlin-native-${{ runner.os }}-

      - name: Create .env file
        run: |
          cat > .env << EOF
          API_KEY=${{ secrets.API_KEY }}
          REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }}
          REVENUECAT_IOS_KEY=${{ secrets.REVENUECAT_IOS_KEY }}
          ANDROID_BANNER_AD_UNIT_ID=${{ secrets.ANDROID_BANNER_AD_UNIT_ID }}
          IOS_BANNER_AD_UNIT_ID=${{ secrets.IOS_BANNER_AD_UNIT_ID }}
          ANDROID_INTERSTITIAL_AD_UNIT_ID=${{ secrets.ANDROID_INTERSTITIAL_AD_UNIT_ID }}
          IOS_INTERSTITIAL_AD_UNIT_ID=${{ secrets.IOS_INTERSTITIAL_AD_UNIT_ID }}
          ANDROID_REWARDED_AD_UNIT_ID=${{ secrets.ANDROID_REWARDED_AD_UNIT_ID }}
          IOS_REWARDED_AD_UNIT_ID=${{ secrets.IOS_REWARDED_AD_UNIT_ID }}
          DATADOG_ENABLED=${{ secrets.DATADOG_ENABLED }}
          DATADOG_CLIENT_TOKEN=${{ secrets.DATADOG_CLIENT_TOKEN }}
          DATADOG_APPLICATION_ID=${{ secrets.DATADOG_APPLICATION_ID }}
          DATADOG_ENVIRONMENT=${{ secrets.DATADOG_ENVIRONMENT }}
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
          ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}
          TOTP_SECRET=${{ secrets.TOTP_SECRET_BASE32 }}
          DEBUG=false
          EOF

      - name: Decode Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" | base64 -d > composeApp/google-services.json

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --parallel --continue --build-cache

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: "**/build/test-results/**/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true

  # Job 3: Commit version ONLY after tests pass
  commit:
    name: Commit Version & Tag
    needs: [ version, test ]
    runs-on: ubuntu-latest-8-core
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Commit version changes
        run: |
          # Extract semver without build number for git tag
          SEMVER=$(echo "${{ needs.version.outputs.version_name }}" | sed 's/-b[0-9]*$//')

          # Check if this tag already exists on the remote (e.g. from a previous run attempt)
          if git ls-remote --tags origin "refs/tags/v${SEMVER}" | grep -q "v${SEMVER}"; then
            echo "✅ Tag v${SEMVER} already exists on remote — skipping commit, tag and push (idempotent re-run)"
            exit 0
          fi

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add version.properties CHANGELOG.md docs/release-notes/
          git commit -m "chore(release): bump version to ${{ needs.version.outputs.version_name }} [skip ci]"

          git tag -a "v${SEMVER}" -m "Release ${{ needs.version.outputs.version_name }}"

          # Push both commit and tag
          git push origin HEAD:${{ github.ref_name }}
          git push origin "v${SEMVER}"

  # Job 4: Build AAB (after commit)
  build-aab:
    name: Build Release AAB
    needs: [ version, commit ]
    runs-on: ubuntu-latest-8-core # Use larger runner for Android builds
    
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx6g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError" -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true -Dorg.gradle.caching=true -Dkotlin.incremental=true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Use wrapper version for consistency
          gradle-version: wrapper
          
          # Main branch always writes to cache
          cache-read-only: false
          cache-cleanup: on-success
          cache-overwrite-existing: false
          
          # Wrapper validation (enabled by default in v4+)
          validate-wrappers: true
          
          # Full job summary for release builds
          add-job-summary: always
          
          # Dependency graph for security
          dependency-graph: generate-and-submit

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
            ~/.android/avd
          key: android-sdk-${{ runner.os }}-${{ hashFiles('**/build.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: |
            ~/.konan
            ~/.gradle/caches/kotlin-*
          key: kotlin-native-${{ runner.os }}-${{ hashFiles('**/build.gradle*') }}
          restore-keys: |
            kotlin-native-${{ runner.os }}-

      - name: Create .env file
        run: |
          cat > .env << EOF
          API_KEY=${{ secrets.API_KEY }}
          REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }}
          REVENUECAT_IOS_KEY=${{ secrets.REVENUECAT_IOS_KEY }}
          ANDROID_BANNER_AD_UNIT_ID=${{ secrets.ANDROID_BANNER_AD_UNIT_ID }}
          IOS_BANNER_AD_UNIT_ID=${{ secrets.IOS_BANNER_AD_UNIT_ID }}
          ANDROID_INTERSTITIAL_AD_UNIT_ID=${{ secrets.ANDROID_INTERSTITIAL_AD_UNIT_ID }}
          IOS_INTERSTITIAL_AD_UNIT_ID=${{ secrets.IOS_INTERSTITIAL_AD_UNIT_ID }}
          ANDROID_REWARDED_AD_UNIT_ID=${{ secrets.ANDROID_REWARDED_AD_UNIT_ID }}
          IOS_REWARDED_AD_UNIT_ID=${{ secrets.IOS_REWARDED_AD_UNIT_ID }}
          DATADOG_ENABLED=${{ secrets.DATADOG_ENABLED }}
          DATADOG_CLIENT_TOKEN=${{ secrets.DATADOG_CLIENT_TOKEN }}
          DATADOG_APPLICATION_ID=${{ secrets.DATADOG_APPLICATION_ID }}
          DATADOG_ENVIRONMENT=${{ secrets.DATADOG_ENVIRONMENT }}
          MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}
          ADMOB_APP_ID=${{ secrets.ADMOB_APP_ID }}
          TOTP_SECRET=${{ secrets.TOTP_SECRET_BASE32 }}
          DEBUG=false
          EOF

      - name: Decode Google Services JSON
        env:
          FIREBASE_GOOGLE_SERVICES_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: echo "$FIREBASE_GOOGLE_SERVICES_JSON" | base64 -d > composeApp/google-services.json

      - name: Print google-services.json MD5 hash
        run: md5sum composeApp/google-services.json

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "KEYSTORE_FILE=$(pwd)/release.keystore" >> $GITHUB_ENV

      - name: Build Release AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:bundleRelease :wearApp:bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_FILE \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload AAB and mapping
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: |
            composeApp/build/outputs/bundle/release/*.aab
            composeApp/build/outputs/mapping/release/mapping.txt
            wearApp/build/outputs/bundle/release/*.aab
            wearApp/build/outputs/mapping/release/mapping.txt
          retention-days: 90

  # Job 5: Deploy to Google Play Store (after AAB build completes)
  # Disabled by default — only runs when manually triggered with deploy_to_play_store=true.
  # The AABs are always available as the `release-aab` workflow artifact for manual upload.
  deploy-play-store:
    name: Deploy to Play Store
    needs: [ version, build-aab ]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_to_play_store == 'true' }}
    runs-on: ubuntu-latest-8-core
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: aab/

      - name: Resolve artifact paths
        id: artifacts
        run: |
          PHONE_AAB=$(find aab/composeApp -name "*.aab" -type f | head -n 1)
          WEAR_AAB=$(find aab/wearApp -name "*.aab" -type f | head -n 1)
          PHONE_MAPPING=$(find aab/composeApp -name "mapping.txt" -type f | head -n 1)
          WEAR_MAPPING=$(find aab/wearApp -name "mapping.txt" -type f | head -n 1)
          echo "phone_aab=$PHONE_AAB" >> $GITHUB_OUTPUT
          echo "wear_aab=$WEAR_AAB" >> $GITHUB_OUTPUT
          echo "phone_mapping=$PHONE_MAPPING" >> $GITHUB_OUTPUT
          echo "wear_mapping=$WEAR_MAPPING" >> $GITHUB_OUTPUT
          if [ -n "$WEAR_AAB" ]; then
            echo "has_wear=true" >> $GITHUB_OUTPUT
          else
            echo "has_wear=false" >> $GITHUB_OUTPUT
          fi

      - name: Decode Service Account
        env:
          PLAY_CONSOLE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_CONSOLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$PLAY_CONSOLE_SERVICE_ACCOUNT_JSON" | base64 -d > service-account.json

      - name: Create Play Store release notes
        run: |
          mkdir -p docs/release-notes/en-US/
          echo "${{ needs.version.outputs.changelog }}" > docs/release-notes/en-US/default.txt

      - name: Deploy Phone AAB to Google Play Store (Internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: me.calebjones.spacelaunchnow
          releaseFiles: ${{ steps.artifacts.outputs.phone_aab }}
          track: internal
          status: completed
          mappingFile: ${{ steps.artifacts.outputs.phone_mapping }}
          whatsNewDirectory: docs/release-notes/whatsnew/

      - name: Deploy Wear AAB to Google Play Store (Wear Internal)
        if: steps.artifacts.outputs.has_wear == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service-account.json
          packageName: me.calebjones.spacelaunchnow
          releaseFiles: ${{ steps.artifacts.outputs.wear_aab }}
          track: wear:internal
          status: completed
          mappingFile: ${{ steps.artifacts.outputs.wear_mapping }}
          whatsNewDirectory: docs/release-notes/whatsnew/

      - name: Play Store Deployment Summary
        run: |
          echo "## 🎯 Google Play Store Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Code:** ${{ needs.version.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Phone Track:** internal" >> $GITHUB_STEP_SUMMARY
          echo "**Wear Track:** wear:internal" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Success ✅" >> $GITHUB_STEP_SUMMARY

  # Job 6: Deploy to Firebase Distribution (parallel with Play Store)
  deploy-firebase:
    name: Deploy to Firebase
    needs: [ version, build-aab ]
    runs-on: ubuntu-latest-8-core
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: aab/

      - name: Resolve artifact paths
        id: artifacts
        run: |
          # Firebase only distributes the phone APK/AAB — find it explicitly
          AAB_PATH=$(find aab/composeApp -name "*.aab" -type f | head -n 1)
          echo "aab=$AAB_PATH" >> $GITHUB_OUTPUT

      - name: Decode Service Account
        env:
          PLAY_CONSOLE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_CONSOLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$PLAY_CONSOLE_SERVICE_ACCOUNT_JSON" | base64 -d > service-account.json

      - name: Deploy AAB to Firebase Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFile: service-account.json
          groups: vip_testers
          file: ${{ steps.artifacts.outputs.aab }}
          releaseNotes: |
            Space Launch Now ${{ needs.version.outputs.version_name }} (AAB)
            
            ${{ needs.version.outputs.changelog }}
            
            See full details at: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version.outputs.version_name }}

      - name: Firebase Deployment Summary
        run: |
          echo "## 🔥 Firebase Distribution Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Code:** ${{ needs.version.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Groups:** vip_testers" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Success ✅" >> $GITHUB_STEP_SUMMARY

  # Job 7: Create GitHub Release (after Firebase deployment completes)
  create-release:
    name: Create GitHub Release
    needs: [ version, build-aab, deploy-firebase ]
    runs-on: ubuntu-latest-8-core
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download version files
        uses: actions/download-artifact@v4
        with:
          name: version-files

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: aab/

      - name: Resolve artifact paths
        id: artifacts
        run: |
          AAB_PATH=$(find aab -name "*.aab" -type f | head -n 1)
          MAPPING_PATH=$(find aab -name "mapping.txt" -type f | head -n 1)
          echo "aab=$AAB_PATH" >> $GITHUB_OUTPUT
          echo "mapping=$MAPPING_PATH" >> $GITHUB_OUTPUT

      # Temporarily disabled during testing
      - name: Create GitHub Release
        if: false
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.version_name }}
          name: "Space Launch Now ${{ needs.version.outputs.version_name }}"
          body_path: release-notes.txt
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.aab }}
            ${{ steps.artifacts.outputs.mapping }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version Code:** ${{ needs.version.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Success ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Release AAB (Android)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ProGuard Mapping" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Deployments" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Google Play Store (Alpha Track)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Firebase Distribution (Android AAB)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GitHub Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** https://github.com/${{ github.repository }}/releases/tag/v${{ needs.version.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY