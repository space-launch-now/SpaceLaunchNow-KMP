name: Test Version Bumping

on:
  workflow_dispatch:
  push:
    branches: [ test-version-bump ]

permissions:
  contents: write

jobs:
  test-version-calculation:
    name: Test Conventional Commits Version Bump
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Show recent commits
        run: |
          echo "📜 Last 10 commits:"
          git log --oneline -10
          echo ""
          echo "📋 Checking for conventional commit format..."
          git log --oneline -10 | grep -E "^[a-f0-9]+ (feat|fix|chore|docs|refactor|test|ci|perf|build|style)(\(.+\))?:" && echo "✅ Found conventional commits" || echo "⚠️  No conventional commits found"

      - name: Show current version
        run: |
          echo "📦 Current version.properties:"
          cat version.properties
          echo ""

      - name: Conventional Changelog Action
        id: changelog
        uses: TriPSs/conventional-changelog-action@v5
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-file: "CHANGELOG.md"
          version-file: "./version.properties"
          version-path: "version"
          skip-version-file: "false"
          skip-commit: "true"
          skip-tag: "true"
          git-push: "false"
          tag-prefix: "v"
          preset: "conventionalcommits"
          release-count: "0"

      - name: Debug changelog outputs
        run: |
          echo "🔍 Conventional Changelog Action Outputs:"
          echo "================================================"
          echo "  version: '${{ steps.changelog.outputs.version }}'"
          echo "  tag: '${{ steps.changelog.outputs.tag }}'"
          echo "  skipped: '${{ steps.changelog.outputs.skipped }}'"
          echo "  clean_changelog (first 500 chars):"
          echo "${{ steps.changelog.outputs.clean_changelog }}" | head -c 500
          echo ""
          echo "================================================"
          echo ""

      - name: Show updated version file
        run: |
          echo "📦 Updated version.properties:"
          cat version.properties
          echo ""

      - name: Calculate new version
        id: version
        run: |
          NEW_VERSION="${{ steps.changelog.outputs.version }}"
          echo "📈 Semantic version from action: '$NEW_VERSION'"
          
          # Check if action skipped (no conventional commits found)
          if [ "${{ steps.changelog.outputs.skipped }}" == "true" ]; then
            echo "⚠️  WARNING: Conventional changelog action skipped - no conventional commits detected"
            echo "This means commits since last release don't follow conventional format"
            echo "Expected format: 'feat:', 'fix:', 'chore:', etc."
          fi
          
          # Check if version is empty
          if [ -z "$NEW_VERSION" ] || [ "$NEW_VERSION" == "null" ]; then
            echo "❌ ERROR: No version output from conventional-changelog-action"
            echo "Falling back to current version in version.properties"
            NEW_VERSION=$(grep "^version=" version.properties | cut -d'=' -f2)
            echo "Using fallback version: $NEW_VERSION"
          fi

          # Get previous version to check if semantic version changed
          PREV_VERSION=$(grep "^version=" version.properties | cut -d'=' -f2)
          PREV_BUILD=$(grep "versionBuildNumber=" version.properties | cut -d'=' -f2)
          
          VERSION_MAJOR=$(echo $NEW_VERSION | cut -d'.' -f1)
          VERSION_MINOR=$(echo $NEW_VERSION | cut -d'.' -f2)
          VERSION_PATCH=$(echo $NEW_VERSION | cut -d'.' -f3)
          
          # Reset build number to 1 if semantic version changed, otherwise increment
          if [ "$NEW_VERSION" != "$PREV_VERSION" ]; then
            NEW_BUILD_NUMBER=1
            echo "🔄 Semantic version changed: $PREV_VERSION → $NEW_VERSION (resetting build to 1)"
          else
            NEW_BUILD_NUMBER=$((PREV_BUILD + 1))
            echo "🔢 Same semantic version, incrementing build: b$PREV_BUILD → b$NEW_BUILD_NUMBER"
          fi
          
          VERSION_NAME="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}-b${NEW_BUILD_NUMBER}"
          VERSION_CODE=$((VERSION_MAJOR * 1000000 + VERSION_MINOR * 100000 + VERSION_PATCH * 10000 + NEW_BUILD_NUMBER))
          
          echo ""
          echo "📊 Version Calculation Summary:"
          echo "================================================"
          echo "  Previous Version: $PREV_VERSION"
          echo "  New Version:      $NEW_VERSION"
          echo "  Previous Build:   b$PREV_BUILD"
          echo "  New Build:        b$NEW_BUILD_NUMBER"
          echo "  Final Version:    $VERSION_NAME"
          echo "  Version Code:     $VERSION_CODE"
          echo "================================================"
          
          cat > version.properties << EOF
          # Version configuration for Space Launch Now KMP
          # Format: major.minor.patch-buildNumber
          version=${NEW_VERSION}
          versionMajor=${VERSION_MAJOR}
          versionMinor=${VERSION_MINOR}
          versionPatch=${VERSION_PATCH}
          versionBuildNumber=${NEW_BUILD_NUMBER}
          EOF
          
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Show final version file
        run: |
          echo "📦 Final version.properties:"
          cat version.properties
          echo ""

      - name: Test Summary
        run: |
          echo "✅ TEST COMPLETE"
          echo ""
          echo "📝 What this test verified:"
          echo "  1. Conventional commits are detected from git history"
          echo "  2. conventional-changelog-action calculates correct semver bump"
          echo "  3. Build number increments or resets appropriately"
          echo "  4. Final version format is correct (major.minor.patch-bBUILD)"
          echo ""
          echo "🎯 Final version: ${{ steps.version.outputs.version_name }}"
          echo "🔢 Final version code: ${{ steps.version.outputs.version_code }}"
          echo ""
          echo "💡 Next steps:"
          echo "  - If version bumped correctly: semver is working! ✅"
          echo "  - If version didn't bump: check commit message format"
          echo "  - Expected formats: feat:, fix:, chore:, docs:, etc."

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: version-test-results
          path: |
            version.properties
            CHANGELOG.md
          retention-days: 1

